<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFDevs Price Calculator Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark-900': '#121212',
                        'dark-800': '#1a1a1a',
                        'dark-700': '#222222',
                        'dark-600': '#2c2c2c',
                    },
                },
            },
        }
    </script>
</head>

<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script src="../dist/index.js"></script>
    <script>
        // Demo initialization will be handled by the package itself
        document.addEventListener('DOMContentLoaded', function () {
            const div = document.createElement('div');
            div.className = 'p-4 text-center';
            div.innerHTML = `
        <h1 class="text-2xl mb-4">UFDevs Price Calculator Demo</h1>
        <p class="mb-8">This is a demo of the UFDevs Price Calculator component. Please install and use the NPM package in your React project.</p>
        <div class="bg-dark-800 p-4 rounded-lg">
          <code>npm install ufdevs-ppc</code>
        </div>
      `;
            document.getElementById('root').appendChild(div);
        });
    </script>
</body>

</html>
